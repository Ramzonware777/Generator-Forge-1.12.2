    writer: java
    name: "@SRCROOT/@BASEPACKAGEPATH/init/@JavaModNameProcedures.java"
    condition: "${w.getGElementsOfType('procedure')?filter(e -> e.procedurexml?contains('player_left_click_air') || e.procedurexml?contains('player_right_click_empty_hand'))?size != 0}"