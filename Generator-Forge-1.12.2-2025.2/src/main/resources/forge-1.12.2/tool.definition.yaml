templates:
  - template: tool/tool.java.ftl
    name: "@SRCROOT/@BASEPACKAGEPATH/item/@NAMEItem.java"
  - template: json/tool.json.ftl
    writer: json
    name: "@MODASSETSROOT/models/item/@registryname.json"
  - template: json/item_cmodel.json.ftl
    writer: json
    condition: hasCustomJSONModel()
    name: "@MODASSETSROOT/models/item/@registryname.json"
  - template: json/model_item.json.ftl
    writer: json
    name: "@MODASSETSROOT/items/@registryname.json"

global_templates:
  - template: elementinits/tools.java.ftl
    writer: java
    condition: "${w.getGElementsOfType('tool')?size != 0}"
    name: "@SRCROOT/@BASEPACKAGEPATH/init/@JavaModNameTools.java"

localizationkeys:
  - key: item.@modid.@registryname.name
    mapto: name

tags:
  - tag: items.@modid.@registryname_repair_items
    entryprovider: data.getRepairItemsAsStringList()