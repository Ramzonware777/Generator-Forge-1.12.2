defaultvalue: EnumFacing.NORTH
scopes:
  local:
    init: ${var.getType().getJavaType(generator.getWorkspace())} ${var.getName()} = ${var.getType().getDefaultValue(generator.getWorkspace())};
    get: ${name}
    set: ${name} = ${opt.removeParentheses(value)};
  global_session:
    init: public static EnumFacing ${var.getName()} = ${generator.map(var.getValue(), "directions")};
    get: ${JavaModName}Variables.${name}
    set: ${JavaModName}Variables.${name} = ${opt.removeParentheses(value)};
  global_world:
    init: public EnumFacing ${var.getName()} = ${generator.map(var.getValue(), "directions")};
    read: ${var.getName()} = EnumFacing.getFront(nbt.getInteger("${var.getName()}"));
    write: nbt.setInteger("${var.getName()}", ${var.getName()}.getIndex());
    get: ${JavaModName}Variables.WorldVariables.get(world).${name}
    set: |
      ${JavaModName}Variables.WorldVariables.get(world).${name} = ${opt.removeParentheses(value)};
      ${JavaModName}Variables.WorldVariables.get(world).syncData(world);
  global_map:
    init: public EnumFacing ${var.getName()} = ${generator.map(var.getValue(), "directions")};
    read: ${var.getName()} = EnumFacing.getFront(nbt.getInteger("${var.getName()}"));
    write: nbt.setInteger("${var.getName()}", ${var.getName()}.getIndex());
    get: ${JavaModName}Variables.MapVariables.get(world).${name}
    set: |
      ${JavaModName}Variables.MapVariables.get(world).${name} = ${opt.removeParentheses(value)};
      ${JavaModName}Variables.MapVariables.get(world).syncData(world);
  player_lifetime:
    init: public EnumFacing ${var.getName()} = ${generator.map(var.getValue(), "directions")};
    read: instance.${var.getName()} = EnumFacing.getFront(nbt.getInteger("${var.getName()}"));
    write: nbt.setInteger("${var.getName()}", instance.${var.getName()}.getIndex());
    get: |
      (${JavaModName}Variables.PlayerVariables.orElse(${entity}.getCapability(${JavaModName}Variables.PLAYER_VARIABLES_CAPABILITY, null)).${name})
    set: |
      {
        EnumFacing _setval = ${opt.removeParentheses(value)};
        ${JavaModName}Variables.PlayerVariables.ifPresent(${entity}.getCapability(${JavaModName}Variables.PLAYER_VARIABLES_CAPABILITY, null), capability -> {
          capability.${name} = _setval;
          capability.syncPlayerVariables(${entity});
        });
      }
  player_persistent:
    init: public EnumFacing ${var.getName()} = ${generator.map(var.getValue(), "directions")};
    read: instance.${var.getName()} = EnumFacing.getFront(nbt.getInteger("${var.getName()}"));
    write: nbt.setInteger("${var.getName()}", instance.${var.getName()}.getIndex());
    get: |
      (${JavaModName}Variables.PlayerVariables.orElse(${entity}.getCapability(${JavaModName}Variables.PLAYER_VARIABLES_CAPABILITY, null)).${name})
    set: |
      {
        EnumFacing _setval = ${opt.removeParentheses(value)};
        ${JavaModName}Variables.PlayerVariables.ifPresent(${entity}.getCapability(${JavaModName}Variables.PLAYER_VARIABLES_CAPABILITY, null), capability -> {
          capability.${name} = _setval;
          capability.syncPlayerVariables(${entity});
        });
      }
